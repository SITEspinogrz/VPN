<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spinogrzVPN | PRIVATE SYSTEM</title>
    <style>
        body { background-color: #0a0000; color: #ff0000; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .terminal { background: rgba(15, 0, 0, 0.95); border: 2px solid #ff0000; padding: 30px; box-shadow: 0 0 25px #ff000055; width: 90%; max-width: 500px; text-align: center; }
        h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .stats { border-top: 1px solid #440000; margin-top: 20px; padding-top: 15px; text-align: left; font-size: 0.8rem; color: #880000; }
        .user-line { margin: 5px 0; color: #ff3333; }
        .btn { background: #ff0000; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; width: 100%; }
        .btn:hover { background: #fff; color: #ff0000; }
        input { background: #000; border: 1px solid #ff0000; color: #ff0000; padding: 10px; width: 100%; box-sizing: border-box; text-align: center; margin-top: 10px; outline: none; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>spinogrzVPN</h1>
    <p style="color: #fff; font-size: 0.9rem;">ДОСТУП ОГРАНИЧЕН. ТРЕБУЕТСЯ КЛЮЧ ИЗ БОТА.</p>
    
    <input type="password" id="pass" placeholder="ВВЕДИТЕ ПАРОЛЬ">
    <button class="btn" onclick="checkAuth()">ВХОД В СИСТЕМУ</button>

    <div class="stats" id="userStats">
        ЗАГРУЗКА ДАННЫХ ИЗ СЕТИ...
    </div>
</div>

<script>
    // 1. Проверка пароля (тот что выдает бот)
    function checkAuth() {
        const pass = document.getElementById('pass').value;
        if(pass === 'spinogrz2024') {
            alert('ДОСТУП РАЗРЕШЕН. Переходим к инструкции...');
            window.location.href = "https://t.me/твой_бот"; // Ссылка на бота
        } else {
            alert('ОШИБКА ДОСТУПА. IP ЗАПИСАН.');
        }
    }

    // 2. Скрипт для получения статистики из users.json
    async function loadStats() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/sitespinogrz/VPN/main/users.json');
            const users = await response.json();
            const statsBox = document.getElementById('userStats');
            
            let html = `<b>ПОСЛЕДНЯЯ АКТИВНОСТЬ:</b><br>`;
            // Берем последних 5 пользователей
            users.slice(-5).reverse().forEach(u => {
                html += `<div class="user-line"> > user_${u.user} [${u.type}] — OK</div>`;
            });
            statsBox.innerHTML = html + `<br>ВСЕГО УЗЛОВ: ${users.length + 128}`;
        } catch (e) {
            document.getElementById('userStats').innerHTML = "СИСТЕМА АВТОНОМНА. СТАТИСТИКА СКРЫТА.";
        }
    }
    loadStats();
</script>

</body>
</html>
