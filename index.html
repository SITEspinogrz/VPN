<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spinogrzVPN | CONTROL PANEL</title>
    <style>
        :root { --red: #ff0000; --dark: #0a0000; }
        body { background: var(--dark); color: var(--red); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: rgba(15, 0, 0, 0.95); border: 2px solid var(--red); padding: 30px; width: 90%; max-width: 450px; box-shadow: 0 0 25px var(--red); text-align: center; }
        h1 { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }
        input { background: #000; border: 1px solid var(--red); color: var(--red); padding: 12px; width: 100%; box-sizing: border-box; text-align: center; font-size: 1.2rem; outline: none; margin-bottom: 15px; }
        .btn { background: var(--red); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        #dashboard { display: none; }
        .timer { font-size: 1.8rem; color: #fff; background: #220000; padding: 15px; margin: 15px 0; border: 1px dashed var(--red); }
        .link-box { background: #000; border: 1px solid #440000; padding: 10px; font-size: 0.7rem; color: #777; word-break: break-all; margin-top: 10px; }
        .status { font-size: 0.8rem; color: #00ff00; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="box" id="loginPage">
    <h1>SYSTEM AUTH</h1>
    <p>ВВЕДИТЕ ВАШ КОД ДОСТУПА:</p>
    <input type="text" id="passInput" placeholder="SP-XXXXXX">
    <button class="btn" onclick="auth()">ПОДЛЮЧИТЬСЯ</button>
</div>

<div class="box" id="dashboard">
    <div class="status">● SECURE CONNECTION ESTABLISHED</div>
    <h1>spinogrzVPN</h1>
    
    <label>ВРЕМЯ ДО ИСТЕЧЕНИЯ:</label>
    <div class="timer" id="clock">00:00:00</div>

    <button class="btn" onclick="copyLink()">СКОПИРОВАТЬ ССЫЛКУ ВПН</button>
    <div class="link-box" id="urlDisplay">loading...</div>

    <p style="font-size: 0.7rem; color: #555; margin-top: 20px;">
        ИНСТРУКЦИЯ: Скопируйте ссылку и вставьте её в приложение v2rayNG / Hiddify в раздел подписок.
    </p>
    <button class="btn" style="background:#220000; color:var(--red); margin-top:10px;" onclick="location.reload()">ВЫХОД</button>
</div>

<script>
    const REPO = "sitespinogrz/VPN";
    let user = null;

    async function auth() {
        const key = document.getElementById('passInput').value.trim();
        try {
            const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/users.json?v=${Date.now()}`);
            const data = await res.json();
            user = data.find(u => u.key === key);

            if (user) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('urlDisplay').innerText = user.sub_link;
                startClock(user.expiry);
            } else {
                alert("ОШИБКА: Ключ не найден.");
            }
        } catch (e) { alert("Ошибка базы данных."); }
    }

    function startClock(expiry) {
        const clock = document.getElementById('clock');
        const interval = setInterval(() => {
            const now = Math.floor(Date.now() / 1000);
            const diff = expiry - now;

            if (expiry > 4000000000) {
                clock.innerText = "INFINITY (ВЕЧНО)";
                clearInterval(interval);
                return;
            }

            if (diff <= 0) {
                clock.innerText = "EXPIRED";
                clearInterval(interval);
                return;
            }

            const d = Math.floor(diff / 86400);
            const h = Math.floor((diff % 86400) / 3600);
            const m = Math.floor((diff % 3600) / 60);
            const s = diff % 60;
            clock.innerText = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);
    }

    function copyLink() {
        navigator.clipboard.writeText(user.sub_link);
        alert("Ссылка скопирована!");
    }
</script>
</body>
</html>
